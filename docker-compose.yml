version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learning"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learnpath_net

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - learnpath_net

  # ── Backend (FastAPI) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT}
    volumes:
      - ./backend:/app          # Hot-reload: montar código fuente
    ports:
      - "9000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - learnpath_net

  # ── Frontend (Next.js) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      WATCHPACK_POLLING: "true"    # Hot-reload en Docker
    volumes:
      - ./frontend:/app            # Hot-reload: montar código fuente
      - /app/node_modules          # Excluir node_modules del volumen
      - /app/.next                 # Excluir .next del volumen
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - learnpath_net

  # ── Adminer (UI para PostgreSQL) ────────────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      ADMINER_DESIGN: ${ADMINER_DESIGN:-pepa-linha}
    depends_on:
      - db
    networks:
      - learnpath_net

volumes:
  postgres_data:
  redis_data:

networks:
  learnpath_net:
    driver: bridge
